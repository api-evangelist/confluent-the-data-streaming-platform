aid: confluent-the-data-streaming-platform
name: Confluent | the Data Streaming Platform
description: >-
  Confluent is a fully managed data streaming platform built by the original
  creators of Apache Kafka. It lets organizations stream, connect, process,
  and govern data in motion through a cloud-native service (Confluent Cloud)
  and the on-prem/self-managed Confluent Platform. Confluent's developer
  surface includes the Confluent Cloud REST API for managing clusters,
  environments, and access; the Kafka REST Proxy for producing and consuming
  events over HTTP; the Schema Registry REST API for governance of Avro,
  JSON Schema, and Protobuf schemas; the Kafka Connect REST API for managing
  connectors; the ksqlDB REST API for stream processing; and managed Apache
  Flink. Authentication is API-key based (Cloud) or HTTP/mTLS/OAuth (Platform).
type: Index
position: Consumer
access: 3rd-Party
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: >-
  https://raw.githubusercontent.com/api-evangelist/confluent-the-data-streaming-platform/refs/heads/main/apis.yml
created: '2025-08-19'
modified: '2026-04-28'
specificationVersion: '0.19'
kind: company
tags:
  - Apache Flink
  - Apache Kafka
  - Confluent Cloud
  - Connectors
  - Data Streaming
  - Event Streaming
  - Kafka Connect
  - ksqlDB
  - Real-Time Data
